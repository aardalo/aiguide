name: CI

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run linter
        working-directory: web
        run: npm run lint
        continue-on-error: true

      - name: Type checking with TypeScript
        working-directory: web
        run: npx tsc --noEmit
        continue-on-error: true

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Run unit tests
        working-directory: web
        run: npm run test:unit
        continue-on-error: true

      - name: Upload coverage
        if: always()
        uses: codecov/codecov-action@v3
        with:
          files: ./web/coverage/coverage-final.json
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: 'web/package-lock.json'

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Generate Prisma Client
        working-directory: web
        run: npx prisma generate

      - name: Build Next.js application
        working-directory: web
        run: npm run build

      - name: Build size check
        working-directory: web
        run: |
          SIZE_KB=$(($(du -sb .next | cut -f1) / 1024))
          echo "Build size: ${SIZE_KB} KB"
          if [ $SIZE_KB -gt 100000 ]; then
            echo "⚠️  Build size exceeded 100MB threshold"
            exit 1
          fi
        continue-on-error: true
